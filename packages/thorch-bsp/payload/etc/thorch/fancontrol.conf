# Thorch PWM fan control defaults.
#
# Profiles use the ROCKNIX SM8550 fancontrol temperature steps:
#   quiet      - later fan ramp, lower noise
#   moderate   - balanced default
#   aggressive - earlier fan ramp
#   custom     - read THORCH_FAN_T1..T6 and THORCH_FAN_MAX_TEMP below
THORCH_FAN_PROFILE=moderate

# Poll interval in seconds.
THORCH_FAN_POLL_SECONDS=3

# Optional overrides. Leave empty for sysfs autodetection.
# THORCH_FAN_PWM_PATH=/sys/class/hwmon/hwmon0/pwm1
# THORCH_FAN_TEMP_SENSORS="/sys/devices/virtual/thermal/thermal_zone0/temp /sys/devices/virtual/thermal/thermal_zone1/temp"

# Custom profile example values, in millidegrees Celsius.
# THORCH_FAN_T1=55000
# THORCH_FAN_T2=60000
# THORCH_FAN_T3=65000
# THORCH_FAN_T4=70000
# THORCH_FAN_T5=75000
# THORCH_FAN_T6=80000
# THORCH_FAN_MAX_TEMP=85000
